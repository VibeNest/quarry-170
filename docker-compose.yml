services:
  api:
    build: .
    container_name: quarry-api
    depends_on:
    - postgres
    - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
    expose:
    - "8000"
  postgres:
    image: pgvector/pgvector:pg17
    container_name: quarry-postgres
    environment:
      POSTGRES_DB: quarry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1912
    volumes:
    - postgres_data:/var/lib/postgresql/data
    expose:
    - "5432"
  redis:
    image: redis:7
    container_name: quarry-redis
    expose:
    - "6379"
volumes:
  postgres_data:
